services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kpisoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kpisoc}
      POSTGRES_DB: ${POSTGRES_DB:-kpisoc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kpisoc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    profiles: ["dev", "preview"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      PROJECT_NAME: ${PROJECT_NAME:-KPI-SOC}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kpisoc:kpisoc@db:5432/kpisoc}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  backend-prod:
    build:
      context: ./backend
    profiles: ["prod"]
    environment:
      APP_ENV: prod
      PROJECT_NAME: ${PROJECT_NAME:-KPI-SOC}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kpisoc:kpisoc@db:5432/kpisoc}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8080}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    profiles: ["dev", "preview"]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  frontend-prod:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: /api/v1
    profiles: ["prod"]
    depends_on:
      - backend-prod

  nginx:
    image: nginx:1.27-alpine
    profiles: ["prod"]
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-prod
      - frontend-prod

volumes:
  postgres_data:
  frontend_node_modules:
