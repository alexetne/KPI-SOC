services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kpisoc_test
      POSTGRES_PASSWORD: kpisoc_test
      POSTGRES_DB: kpisoc_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpisoc_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-test:
    build:
      context: ./backend
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://kpisoc_test:kpisoc_test@test-db:5432/kpisoc_test
      BACKEND_CORS_ORIGINS: http://localhost:5173
    command: sh -c "alembic upgrade head && pytest --cov=app"
    depends_on:
      test-db:
        condition: service_healthy
